<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <style>
    .brand-title {
      font-family: 'Arial Rounded MT Bold', 'Nunito', 'Comfortaa', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 32px;
    }
    .brand-subtitle {
      font-family: 'Montserrat', 'Inter', 'Helvetica Neue', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 4px;
      fill: #7D8A99;
    }
  </style>

  <g transform="translate(15, 10)">
    <!-- Icon Group -->
    <g transform="translate(15, 10)">
      <!-- Left Footprint (Blue) -->
      <g transform="translate(0, 10) rotate(-15 25 45)" fill="#2B86C5">
        <!-- Sole -->
        <path d="M 22 75 C 12 75, 8 68, 8 55 C 8 40, 18 36, 21 22 C 23 16, 28 16, 30 22 C 34 36, 40 40, 40 55 C 40 68, 32 75, 22 75 Z" />
        <!-- Toes -->
        <circle cx="14" cy="11" r="5" />
        <circle cx="23" cy="9" r="4.2" />
        <circle cx="31" cy="11" r="3.7" />
        <circle cx="37" cy="16" r="3.2" />
        <circle cx="41" cy="23" r="2.7" />
      </g>

      <!-- Right Footprint (Pink) -->
      <g transform="translate(38, 0) rotate(15 25 45)" fill="#FF3E6C">
        <!-- Sole -->
        <path d="M 28 75 C 38 75, 42 68, 42 55 C 42 40, 32 36, 29 22 C 27 16, 22 16, 20 22 C 16 36, 10 40, 10 55 C 10 68, 18 75, 28 75 Z" />
        <!-- Toes -->
        <circle cx="36" cy="11" r="5" />
        <circle cx="27" cy="9" r="4.2" />
        <circle cx="19" cy="11" r="3.7" />
        <circle cx="13" cy="16" r="3.2" />
        <circle cx="9" cy="23" r="2.7" />
      </g>
    </g>

    <!-- Text Group -->
    <g transform="translate(130, 45)">
      <!-- Main Title -->
      <text x="0" y="8" class="brand-title">
        <tspan fill="#2B86C5">BABY</tspan> <tspan fill="#FF3E6C">STEPS</tspan>
      </text>
      <!-- Subtitle -->
      <text x="3" y="30" class="brand-subtitle">NEWBORN &amp; CHILD CLINIC</text>
    </g>
  </g>
</svg>